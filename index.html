<style>
:root{
  --bg:#0b1020; --bg-2:#111a3a; --card:#141d40; --card-2:#1a2550;
  --ink:#e8edff; --ink-dim:#9aa6d6; --ink-faint:#6b76a8;
  --line:#26305e; --line-soft:#1c2548;
  --brand:#00d3a7; --brand-2:#3b82f6;
  --pos:#34d399; --neg:#f87171; --warn:#fbbf24; --info:#60a5fa;
  --shadow:0 10px 30px rgba(0,0,0,.35);
  --r:18px; --r-sm:12px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
:root[data-theme="light"]{
  --bg:#f4f6fc; --bg-2:#ffffff; --card:#ffffff; --card-2:#f1f4fb;
  --ink:#101633; --ink-dim:#5a648c; --ink-faint:#9aa3c4;
  --line:#e3e8f5; --line-soft:#eef1f9;
  --brand:#00b894; --brand-2:#2563eb;
  --pos:#059669; --neg:#dc2626; --warn:#d97706; --info:#2563eb;
  --shadow:0 8px 24px rgba(30,40,90,.08);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%}
body{
  background:var(--bg); color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,"Helvetica Neue",Arial,"Noto Sans Arabic",sans-serif;
  font-size:15px; line-height:1.45; overscroll-behavior-y:none;
  -webkit-font-smoothing:antialiased;
}
[dir="rtl"] body{font-family:"Noto Sans Arabic",-apple-system,"Segoe UI",system-ui,sans-serif}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:15px}
.hidden{display:none!important}
.app{max-width:560px;margin:0 auto;min-height:100%;padding-bottom:calc(86px + var(--safe-bottom))}

/* Top bar */
.topbar{position:sticky;top:0;z-index:30;background:linear-gradient(180deg,var(--bg) 70%,transparent);
  padding:calc(12px + var(--safe-top)) 18px 10px;display:flex;align-items:center;gap:12px}
.topbar h1{font-size:20px;margin:0;font-weight:800;letter-spacing:-.3px;flex:1;display:flex;align-items:center;gap:8px}
.logo{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--brand),var(--brand-2));
  display:grid;place-items:center;color:#031a16;font-weight:900;font-size:17px}
.iconbtn{width:38px;height:38px;border-radius:11px;background:var(--card);display:grid;place-items:center;
  border:1px solid var(--line);font-size:17px;color:var(--ink-dim)}
.iconbtn:active{transform:scale(.94)}

/* Views */
.view{padding:6px 16px 20px;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.section-title{font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-faint);
  margin:22px 4px 10px;font-weight:700}

/* Cards */
.card{background:var(--card);border:1px solid var(--line-soft);border-radius:var(--r);padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}
.card.flush{padding:0;overflow:hidden}

/* Hero / safe-to-spend */
.hero{background:linear-gradient(135deg,#11224a,#0e3b46);border:1px solid var(--line);color:#eafff8}
:root[data-theme="light"] .hero{background:linear-gradient(135deg,#0b6e63,#13a08c);color:#fff;border:none}
.hero .label{font-size:13px;opacity:.85;display:flex;justify-content:space-between;align-items:center}
.hero .big{font-size:40px;font-weight:850;letter-spacing:-1px;margin:6px 0 2px;line-height:1}
.hero .sub{font-size:13px;opacity:.8}
.hero-row{display:flex;gap:10px;margin-top:14px}
.hero-pill{flex:1;background:rgba(255,255,255,.10);border-radius:12px;padding:9px 10px}
.hero-pill .k{font-size:11px;opacity:.8}
.hero-pill .v{font-size:16px;font-weight:800;margin-top:2px}

/* stat grid */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.stat{background:var(--card);border:1px solid var(--line-soft);border-radius:var(--r-sm);padding:13px}
.stat .k{font-size:12px;color:var(--ink-dim);display:flex;align-items:center;gap:5px}
.stat .v{font-size:21px;font-weight:800;margin-top:4px}
.pos{color:var(--pos)} .neg{color:var(--neg)} .warn{color:var(--warn)}

/* list rows */
.row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--line-soft)}
.row:last-child{border-bottom:none}
.row .av{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;font-size:18px;flex-shrink:0;background:var(--card-2)}
.row .mid{flex:1;min-width:0}
.row .t1{font-weight:650;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row .t2{font-size:12px;color:var(--ink-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.row .amt{font-weight:750;font-variant-numeric:tabular-nums;text-align:end;white-space:nowrap}
.row.tap:active{background:var(--card-2)}

/* badges/chips */
.badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;background:var(--card-2);color:var(--ink-dim)}
.badge.b-warn{background:rgba(251,191,36,.16);color:var(--warn)}
.badge.b-pos{background:rgba(52,211,153,.16);color:var(--pos)}
.badge.b-info{background:rgba(96,165,250,.16);color:var(--info)}
.chips{display:flex;gap:8px;overflow-x:auto;padding:2px;margin:0 -2px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:7px 14px;border-radius:999px;background:var(--card);border:1px solid var(--line);
  font-size:13px;font-weight:600;color:var(--ink-dim)}
.chip.on{background:var(--brand);color:#03201a;border-color:var(--brand)}

/* buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:12px 16px;border-radius:13px;
  background:var(--brand);color:#03201a;font-weight:750;font-size:15px;width:100%}
.btn:active{transform:scale(.98)}
.btn.sec{background:var(--card);color:var(--ink);border:1px solid var(--line)}
.btn.ghost{background:transparent;color:var(--brand)}
.btn.danger{background:rgba(248,113,113,.14);color:var(--neg)}
.btn.sm{padding:8px 12px;font-size:13px;width:auto;border-radius:10px}
.btn-row{display:flex;gap:10px}

/* form */
.field{margin-bottom:13px}
.field label{display:block;font-size:12px;color:var(--ink-dim);margin-bottom:6px;font-weight:600}
.field input,.field select,.field textarea{width:100%;padding:12px 13px;border-radius:12px;
  background:var(--bg-2);border:1px solid var(--line);color:var(--ink);outline:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--brand)}
.seg{display:flex;background:var(--bg-2);border:1px solid var(--line);border-radius:12px;padding:3px;gap:3px}
.seg button{flex:1;padding:9px;border-radius:9px;font-weight:650;color:var(--ink-dim);font-size:14px}
.seg button.on{background:var(--brand);color:#03201a}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* tab bar */
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:40;background:var(--bg-2);
  border-top:1px solid var(--line);display:flex;padding:8px 6px calc(8px + var(--safe-bottom));max-width:560px;margin:0 auto}
.tab{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 2px;color:var(--ink-faint);font-size:10px;font-weight:650}
.tab .ic{font-size:21px;line-height:1}
.tab span:last-child{max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tab.on{color:var(--brand)}
.fab{position:fixed;bottom:calc(72px + var(--safe-bottom));inset-inline-end:18px;z-index:41;width:56px;height:56px;border-radius:18px;
  background:linear-gradient(135deg,var(--brand),var(--brand-2));color:#03201a;font-size:28px;font-weight:300;
  display:grid;place-items:center;box-shadow:0 8px 24px rgba(0,211,167,.4)}
.fab:active{transform:scale(.92)}

/* sheet / modal */
.scrim{position:fixed;inset:0;z-index:60;background:rgba(2,6,20,.6);backdrop-filter:blur(3px);display:flex;align-items:flex-end;justify-content:center;animation:fade .2s}
.sheet{background:var(--bg-2);width:100%;max-width:560px;max-height:92vh;overflow-y:auto;border-radius:24px 24px 0 0;
  padding:8px 18px calc(24px + var(--safe-bottom));animation:slideup .28s cubic-bezier(.2,.8,.2,1)}
@keyframes slideup{from{transform:translateY(100%)}to{transform:none}}
.sheet .grab{width:42px;height:5px;border-radius:3px;background:var(--line);margin:8px auto 14px}
.sheet h2{font-size:19px;margin:0 0 14px;font-weight:800}
.sheet h2 .x{float:inline-end;color:var(--ink-faint);font-size:22px}

/* misc */
.muted{color:var(--ink-dim)} .faint{color:var(--ink-faint)}
.center{text-align:center}
.empty{text-align:center;padding:46px 20px;color:var(--ink-faint)}
.empty .e-ic{font-size:48px;margin-bottom:10px}
.spacer{height:8px}
.flex{display:flex;align-items:center;gap:10px} .between{justify-content:space-between} .grow{flex:1}
.mono{font-variant-numeric:tabular-nums}
.divider{height:1px;background:var(--line-soft);margin:14px 0}
canvas{max-width:100%}
.chartbox{position:relative;width:100%;height:230px;margin:10px 0 4px;touch-action:pan-y;direction:ltr}
.chartbox canvas{position:absolute!important;inset:0;width:100%!important;height:100%!important;display:block}
.card.wide{margin-inline:-6px;padding-inline:6px}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal .d{aspect-ratio:1;border-radius:7px;display:grid;place-items:center;font-size:10px;color:var(--ink-faint);position:relative}
.cal .dow{font-size:10px;color:var(--ink-faint);text-align:center;font-weight:700;padding-bottom:2px}
.toast{position:fixed;bottom:calc(96px + var(--safe-bottom));left:50%;transform:translateX(-50%);z-index:80;
  background:var(--ink);color:var(--bg);padding:11px 18px;border-radius:13px;font-weight:650;font-size:14px;
  box-shadow:var(--shadow);max-width:90%;animation:fade .2s}
.bar-track{height:8px;background:var(--line-soft);border-radius:5px;overflow:hidden;margin-top:6px}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--brand),var(--brand-2));border-radius:5px}
.tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:7px;background:var(--card-2);color:var(--ink-dim);margin-inline-end:4px}
.lockscreen{position:fixed;inset:0;z-index:200;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:30px}
.kpad{display:grid;grid-template-columns:repeat(3,72px);gap:14px;margin-top:8px}
.kpad button{height:72px;border-radius:50%;background:var(--card);border:1px solid var(--line);font-size:26px;font-weight:600}
.pin-dots{display:flex;gap:14px}
.pin-dots .pd{width:14px;height:14px;border-radius:50%;border:2px solid var(--brand)}
.pin-dots .pd.f{background:var(--brand)}
small.hint{display:block;color:var(--ink-faint);font-size:11.5px;margin-top:5px;line-height:1.4}
</style>
</head>
<body>
<div id="lock" class="lockscreen hidden">
  <div class="logo" style="width:64px;height:64px;border-radius:20px;font-size:34px">م</div>
  <div style="font-weight:800;font-size:20px" data-i18n="appName">iMaliya</div>
  <div class="muted" id="lockMsg" data-i18n="enterPin">Enter PIN</div>
  <div class="pin-dots" id="pinDots"></div>
  <div class="kpad" id="kpad"></div>
  <button class="btn ghost" id="lockBio" style="width:auto">🔓 <span data-i18n="useBiometric">Use Face ID</span></button>
</div>

<div class="app" id="app">
  <div class="topbar">
    <h1><span class="logo">م</span> <span id="topTitle" data-i18n="appName">iMaliya</span></h1>
    <button class="iconbtn" id="btnLang" title="Language">ع</button>
    <button class="iconbtn" id="btnTheme" title="Theme">🌙</button>
    <button class="iconbtn" id="btnSettings" title="Settings">⚙️</button>
  </div>
  <div id="viewRoot"></div>
</div>

<button class="fab" id="fab" title="Add">+</button>
<div class="tabbar" id="tabbar"></div>
<div id="modalRoot"></div>
<div id="toastRoot"></div>

  return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');}

let LANG=localStorage.getItem('iml.lang')||'en';
const t=k=>(I18N[LANG]&&I18N[LANG][k])||I18N.en[k]||k;
function applyLang(){
  document.documentElement.lang=LANG;
  document.documentElement.dir=LANG==='ar'?'rtl':'ltr';
  $$('[data-i18n]').forEach(e=>e.textContent=t(e.getAttribute('data-i18n')));

/* currency formatting */
const CUR=localStorage.getItem('iml.cur')||'BHD';
function money(n,{sign=false,cur=CUR}={}){
  const neg=n<0; const abs=Math.abs(n);
  const dec=cur==='BHD'||cur==='KWD'||cur==='OMR'?3:2;
  const s=abs.toLocaleString(LANG==='ar'?'ar-BH':'en-BH',{minimumFractionDigits:dec,maximumFractionDigits:dec});
  const symbol={BHD:'BD',USD:'$',EUR:'€',SAR:'﷼',AED:'AED',KWD:'KD',QAR:'QR',OMR:'OMR'}[cur]||cur;
  let out=`${symbol} ${s}`;
  if(sign)out=(neg?'−':'+')+out; else if(neg)out='−'+out;
  return out;
}
function relDate(ts){const d=new Date(ts),now=new Date();
  const dd=Math.round((startOfDay(now)-startOfDay(d))/86400000);
  if(dd===0)return t('today'); if(dd===1)return t('yesterday');
  return d.toLocaleDateString(LANG==='ar'?'ar-BH':'en-GB',{day:'numeric',month:'short'});}

/* ----------------------------- 2. Storage (IndexedDB) ----------------------------- */
const DB={
  _db:null,
  stores:['txns','accounts','rules','directory','loans','categories','unlinked','meta','smsraw'],
  async open(){
    if(this._db)return this._db;
    this._db=await new Promise((res,rej)=>{
      const r=indexedDB.open('imaliya',1);
      r.onupgradeneeded=e=>{const db=e.target.result;
        this.stores.forEach(s=>{if(!db.objectStoreNames.contains(s))db.createObjectStore(s,{keyPath:'id'});});};
      r.onsuccess=e=>res(e.target.result); r.onerror=e=>rej(e.target.error);
    });
    return this._db;
  },
  async all(store){const db=await this.open();return new Promise((res,rej)=>{
    const r=db.transaction(store).objectStore(store).getAll();
    r.onsuccess=()=>res(r.result||[]);r.onerror=()=>rej(r.error);});},
  async get(store,id){const db=await this.open();return new Promise((res,rej)=>{
    const r=db.transaction(store).objectStore(store).get(id);
    r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});},
  async put(store,obj){const db=await this.open();return new Promise((res,rej)=>{
    const tx=db.transaction(store,'readwrite');tx.objectStore(store).put(obj);
    tx.oncomplete=()=>res(obj);tx.onerror=()=>rej(tx.error);});},
  async putMany(store,arr){const db=await this.open();return new Promise((res,rej)=>{
    const tx=db.transaction(store,'readwrite');const os=tx.objectStore(store);arr.forEach(o=>os.put(o));
    tx.oncomplete=()=>res(arr);tx.onerror=()=>rej(tx.error);});},
  async del(store,id){const db=await this.open();return new Promise((res,rej)=>{
    const tx=db.transaction(store,'readwrite');tx.objectStore(store).delete(id);
    tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);});},
  async clear(store){const db=await this.open();return new Promise((res,rej)=>{
    const tx=db.transaction(store,'readwrite');tx.objectStore(store).clear();
    tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);});},
};

/* ----------------------------- 4. IBAN & account resolver (§4) ----------------------------- */
const normIban=s=>(s||'').toUpperCase().replace(/[\s\-]+/g,'');
function matchIBAN(observed,accounts){
  const o=normIban(observed);
  if(!o)return{account:null,confidence:0,mode:'none'};
  // 1) full exact (no mask chars)
  if(!/[X*·]/i.test(o)){
    const hit=accounts.find(a=>normIban(a.iban)===o);
    if(hit)return{account:hit,confidence:1.0,mode:'full'};
  }
  // 2) masked: prefix + suffix
  const prefix=o.slice(0,8);
  const suffix=(o.match(/(\d{4,})$/)||[])[1];
  if(suffix){
    const cands=accounts.filter(a=>{const ai=normIban(a.iban);
      return ai.startsWith(prefix)&&ai.endsWith(suffix);});
    if(cands.length===1)return{account:cands[0],confidence:suffix.length>=6?0.9:0.7,mode:'masked'};
    if(cands.length>1)return{ambiguous:cands,confidence:0.6,mode:'masked-multi'};
  }
  // 3) unknown
  return{account:null,confidence:0,mode:'unknown',observed:o};
}
// Resolve counterparty IBAN against directory (learned rules)
function matchDirectory(observed){
  const o=normIban(observed); if(!o)return null;
  let hit=S.directory.find(d=>normIban(d.iban)===o&&!/[X*]/i.test(o));
  if(hit)return hit;
  const prefix=o.slice(0,8),suffix=(o.match(/(\d{4,})$/)||[])[1];
  if(suffix){hit=S.directory.find(d=>{const di=normIban(d.iban);
    return di.startsWith(prefix)&&di.endsWith(suffix);});if(hit)return hit;}
  return null;
}
const accById=id=>S.accounts.find(a=>a.id===id);
function maskShow(iban){const o=normIban(iban);if(o.length<=8)return o;
  return o.slice(0,4)+'•••'+o.slice(-4);}

/* ----------------------------- 5. Categorization engine (§5) ----------------------------- */
function applyRules(txn){
  // Rule layer: directory IBAN -> category (strongest), then merchant substring, then keyword
  if(txn.counterpartyIBAN){
    const d=matchDirectory(txn.counterpartyIBAN);
    if(d){ if(!txn.counterpartyName)txn.counterpartyName=d.name;
      if(d.type==='own')txn.isTransfer=true;
      if(d.defaultCategory){txn.category=d.defaultCategory;txn.confidence=Math.max(txn.confidence||0,0.95);return txn;} }
  }
  for(const r of S.rules){
    let ok=false;
    if(r.field==='counterparty'&&txn.counterpartyName)
      ok=txn.counterpartyName.toLowerCase().includes(r.match.toLowerCase());
    else if(r.field==='raw'&&txn.rawText)
      ok=txn.rawText.toLowerCase().includes(r.match.toLowerCase());
    if(ok){txn.category=r.category;txn.confidence=Math.max(txn.confidence||0,0.9);return txn;}
  }
  // keyword heuristics
  const text=((txn.counterpartyName||'')+' '+(txn.rawText||'')).toLowerCase();
  const KW=[['salary|payroll|راتب','Salary'],['rent|إيجار','Rent / Housing'],
    ['fuel|petrol|bapco|station|وقود','Transport / Fuel'],['lulu|carrefour|grocery|بقالة|سوق','Groceries'],
    ['stc|batelco|zain|اتصالات','Telecom'],['ewa|electric|كهرباء|ماء','Utilities'],
    ['netflix|spotify|youtube|subscription|اشتراك','Subscriptions'],
    ['restaurant|cafe|coffee|talabat|مطعم|كافيه','Dining'],['pharmacy|hospital|clinic|صيدلية|مستشفى','Health'],
    ['loan|installment|قسط|قرض','Loan payment'],['transfer|fawri|تحويل','Transfer']];
  for(const[pat,en]of KW){if(new RegExp(pat,'i').test(text)){
    const c=findCatByEn(en);if(c){txn.category=c.id;txn.confidence=Math.max(txn.confidence||0,0.6);return txn;}}}
  if(txn.direction==='in'){const c=findCatByEn('Other income');if(c)txn.category=c.id;}
  else txn.category=txn.category||uncatId();
  txn.confidence=txn.confidence||0.3;
  return txn;
}
// Recurring/subscription detector
function detectRecurring(){
  const groups={};
  S.txns.filter(x=>x.direction==='out'&&!x.isTransfer).forEach(x=>{
    const key=(x.counterpartyName||x.counterpartyIBAN||'?').toLowerCase()+'|'+Math.round(x.amount);
    (groups[key]=groups[key]||[]).push(x);});
  const subs=[];
  for(const k in groups){const arr=groups[k].sort((a,b)=>a.ts-b.ts);
    if(arr.length<2)continue;
    const gaps=[];for(let i=1;i<arr.length;i++)gaps.push((arr[i].ts-arr[i-1].ts)/86400000);
    const avg=gaps.reduce((a,b)=>a+b,0)/gaps.length;
    if(avg>=24&&avg<=38){ // ~monthly
      subs.push({name:arr[0].counterpartyName||maskShow(arr[0].counterpartyIBAN)||'?',
        amount:arr[arr.length-1].amount,count:arr.length,category:arr[0].category,last:arr[arr.length-1].ts});}}
  return subs.sort((a,b)=>b.amount-a.amount);
}

/* ----------------------------- 6. Normalizer + dedup (§3) ----------------------------- */
async function ingest(raw){
  // raw: partial normalized obj. Returns {added, dup}
  const txn={id:uid(),ts:raw.ts||Date.now(),amount:Math.abs(+raw.amount||0),
    currency:raw.currency||CUR,direction:raw.direction||'out',rawText:raw.rawText||'',
    sourceChannel:raw.sourceChannel||'manual',counterpartyIBAN:normIban(raw.counterpartyIBAN),
    counterpartyName:raw.counterpartyName||'',accountId:raw.accountId||null,
    balanceAfter:raw.balanceAfter??null,category:raw.category||null,
    tags:raw.tags||[],confidence:raw.confidence||0,isTransfer:!!raw.isTransfer,
    cardTail:raw.cardTail||null};
  // dedup hash
  const hkey=[txn.amount,todayKey(new Date(txn.ts)),txn.counterpartyIBAN||txn.counterpartyName,txn.accountId,txn.direction].join('|');
  txn.dedup=await sha(hkey);
  if(S.txns.some(x=>x.dedup===txn.dedup))return{dup:true};
  // resolve account via IBAN if account not assigned and an account IBAN present in raw
  if(!txn.accountId&&raw.accountIBAN){
    const m=matchIBAN(raw.accountIBAN,S.accounts);
    if(m.account){txn.accountId=m.account.id;}
  }
  applyRules(txn);
  // new-IBAN alert: counterparty IBAN unknown to directory and not own account
  if(txn.counterpartyIBAN&&!matchDirectory(txn.counterpartyIBAN)){
    const unl={id:uid(),iban:txn.counterpartyIBAN,seen:txn.ts,name:txn.counterpartyName,
      sampleTxn:txn.id};
    if(!S.unlinked.some(u=>normIban(u.iban)===txn.counterpartyIBAN)){
      S.unlinked.push(unl);await DB.put('unlinked',unl);}
  }
  S.txns.unshift(txn);S.txns.sort((a,b)=>b.ts-a.ts);
  await DB.put('txns',txn);
  return{added:true,txn};
}

/* ----------------------------- 7. SMS adapter (Channel A, §3) ----------------------------- */
function parseSMS(text,now=Date.now()){
  const out={rawText:text,sourceChannel:'sms',ts:now};
  const T=text.replace(/ /g,' ');
  // amount + currency
  const am=T.match(/\b(BHD|BD|USD|USD\$|SAR|AED|KWD|QAR|OMR|EUR)\s*([\d,]+\.?\d*)/i)
        || T.match(/([\d,]+\.\d{2,3})\s*(BHD|BD|USD|SAR|AED|KWD|QAR|OMR|EUR)/i);
  if(am){const amt=parseFloat((am[1]+am[2]).replace(/[^\d.]/g,''));
    out.amount=parseFloat((am[1].match(/[\d.,]+/)?am[1]:am[2]).replace(/,/g,''))||amt;
    out.currency=(am[1].match(/[A-Z]/i)?am[1]:am[2]).toUpperCase().replace('BD','BHD');}
  // direction
  if(/\b(credit|credited|received|deposit|salary|أضيف|إيداع|دائن)\b/i.test(T))out.direction='in';
  else if(/\b(debit|debited|purchase|withdrawn|paid|payment|pos|خصم|شراء|سحب|دفع)\b/i.test(T))out.direction='out';
  // counterparty IBAN (full or masked)
  const ib=T.match(/\bBH\d{2}[A-Z0-9X\*]{4,30}\b/i)||T.match(/\b[A-Z]{2}\d{2}[A-Z0-9X\*]{10,30}\b/i);
  if(ib)out.counterpartyIBAN=ib[0];
  // own account / card tail (masked "****1234" or "ending 1234")
  const card=T.match(/(?:card|acct|account|a\/c|بطاقة|حساب)[\s\w]*?[Xx\*]+\s*(\d{3,4})\b/i)
        || T.match(/\bending(?:\s+in)?\s+[Xx\*]*\s*(\d{3,4})\b/i);
  if(card)out.cardTail=card[1];
  // balance after
  const bal=T.match(/(?:bal|balance|avail|الرصيد)\D*([\d,]+\.?\d*)/i);
  if(bal)out.balanceAfter=parseFloat(bal[1].replace(/,/g,''));
  // counterparty name (heuristic: 'at X', 'to X', 'from X')
  const nm=T.match(/\b(?:at|to|from|via|لدى|إلى|من)\s+([A-Z][A-Za-z0-9&'\- ]{2,28})/);
  if(nm)out.counterpartyName=nm[1].trim().replace(/\s+(on|dated|ref|avail|bal|account|successful|using|card|via|txn|trans).*$/i,'').trim();
  // employer / Fawri
  if(/fawri\+?/i.test(T))out.tags=['fawri'];
  return out;
}
async function ingestSMSBatch(blob){
  // blob may be multiple messages separated by blank lines, or JSON bridge array
  let msgs=[];
  const trimmed=blob.trim();
  // An entry can be RAW {text,ts} (app parses) OR a pre-PARSED record {amount,direction,...}
  // written by the Scriptable headless capture (no re-parsing needed).
  const asMsg=o=>{
    if(o&&typeof o==='object'&&o.amount!=null)
      return {record:{...o,ts:o.ts?new Date(o.ts).getTime():Date.now()}};
    return {text:(o&&(o.text||o.body||o.message))||String(o),ts:(o&&o.ts)?new Date(o.ts).getTime():Date.now()};
  };
  if(trimmed.startsWith('[')){ // JSON array (whole-file)
    try{msgs=JSON.parse(trimmed).map(asMsg);}catch(e){msgs=[{text:blob,ts:Date.now()}];}
  }else if(/^\s*\{[\s\S]*\}\s*$/.test(trimmed)&&!/\}\s*\n\s*\{/.test(trimmed)){ // single JSON object
    try{msgs=[asMsg(JSON.parse(trimmed))];}catch(e){msgs=[{text:blob,ts:Date.now()}];}
  }else if(/^\s*\{/.test(trimmed)&&/\}\s*$/m.test(trimmed)){ // NDJSON: one {..} per line (what the Shortcut appends)
    msgs=trimmed.split(/\r?\n/).map(l=>l.trim()).filter(Boolean).map(l=>{
      try{return asMsg(JSON.parse(l));}catch(e){return {text:l,ts:Date.now()};}});
  }else{ // raw text blocks separated by blank lines
    msgs=trimmed.split(/\n\s*\n/).filter(s=>s.trim()).map(s=>({text:s.trim(),ts:Date.now()}));
  }
  let added=0,dup=0;
  for(const m of msgs){
    let p;
    if(m.record){p=m.record;p.sourceChannel=p.sourceChannel||'sms';}
    else{p=parseSMS(m.text,m.ts);if(!p.amount)continue;}
    const r=await ingest(p);if(r.added)added++;else if(r.dup)dup++;}
  return{added,dup,total:msgs.length};
}

/* ----------------------------- 8. Statement import (Channel B, §3) ----------------------------- */
function autoDetectColumns(rows){
  // rows: array of arrays. Find header row + map Date/Amount/Desc/Credit/Debit/Balance
  let headerIdx=0,best=0;
  rows.slice(0,8).forEach((r,i)=>{const score=r.filter(c=>/date|amount|desc|debit|credit|balance|تاريخ|مبلغ|بيان|مدين|دائن|رصيد/i.test(String(c))).length;
    if(score>best){best=score;headerIdx=i;}});
  const header=rows[headerIdx].map(c=>String(c||'').toLowerCase());
  const find=pats=>header.findIndex(h=>pats.some(p=>h.includes(p)));
  const map={date:find(['date','تاريخ']),desc:find(['desc','detail','narr','بيان','تفاصيل']),
    amount:find(['amount','مبلغ']),debit:find(['debit','withdraw','مدين','سحب']),
    credit:find(['credit','deposit','دائن','إيداع']),balance:find(['balance','رصيد']),
    iban:find(['iban','آيبان'])};
  return{headerIdx,map,header};
}
function parseDate(v){
  if(v instanceof Date)return v.getTime();
  if(typeof v==='number'&&v>20000&&v<60000){ // excel serial
    return new Date(Math.round((v-25569)*86400*1000)).getTime();}
  const s=String(v).trim();
  let m=s.match(/(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})/);
  if(m){let[_,d,mo,y]=m;y=y.length===2?'20'+y:y;return new Date(+y,+mo-1,+d).getTime();}
  const d=new Date(s);return isNaN(d)?Date.now():d.getTime();
}
async function importRows(rows,accountId){
  const{headerIdx,map}=autoDetectColumns(rows);
  const data=rows.slice(headerIdx+1).filter(r=>r.some(c=>String(c).trim()!==''));
  let added=0,dup=0,credits=0,debits=0,expenses=0,incomeC=0;
  for(const r of data){
    const dateV=map.date>=0?r[map.date]:null; if(!dateV)continue;
    let amount=0,direction='out';
    if(map.amount>=0&&r[map.amount]!==''&&r[map.amount]!=null){
      const raw=String(r[map.amount]).replace(/,/g,'');
      amount=Math.abs(parseFloat(raw)||0);direction=parseFloat(raw)<0?'out':'in';
      // if separate sign convention unclear, infer from debit/credit cols below
    }
    if(map.debit>=0&&String(r[map.debit]).replace(/[^\d.]/g,'')){const d=parseFloat(String(r[map.debit]).replace(/,/g,''));
      if(d>0){amount=d;direction='out';}}
    if(map.credit>=0&&String(r[map.credit]).replace(/[^\d.]/g,'')){const c=parseFloat(String(r[map.credit]).replace(/,/g,''));
      if(c>0){amount=c;direction='in';}}
    if(!amount)continue;
    const desc=map.desc>=0?String(r[map.desc]||''):'';
    const ibanM=(desc.match(/\bBH\d{2}[A-Z0-9X\*]{4,30}\b/i)||[])[0]||(map.iban>=0?r[map.iban]:'');
    const res=await ingest({ts:parseDate(dateV),amount,direction,rawText:desc,
      counterpartyName:desc.slice(0,40),counterpartyIBAN:ibanM,accountId,
      sourceChannel:'import',balanceAfter:map.balance>=0?parseFloat(String(r[map.balance]).replace(/,/g,''))||null:null});
    if(res.added){added++;if(direction==='in'){credits++;incomeC++;}else{debits++;expenses++;}}
    else if(res.dup)dup++;
  }
  return{added,dup,expenses:debits,income:credits};
}
function readFile(file,accountId,cb){
  const ext=file.name.split('.').pop().toLowerCase();
  const reader=new FileReader();
  if(ext==='csv'){
    reader.onload=async e=>{
      const text=e.target.result;
      const rows=text.split(/\r?\n/).map(line=>{
        const out=[];let cur='',q=false;
        for(const ch of line){if(ch==='"')q=!q;else if(ch===','&&!q){out.push(cur);cur='';}else cur+=ch;}
        out.push(cur);return out.map(c=>c.trim().replace(/^"|"$/g,''));});
      cb(await importRows(rows,accountId));};
    reader.readAsText(file);
  }else if(ext==='xlsx'||ext==='xls'){
    reader.onload=async e=>{
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array',cellDates:true});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:true});
      cb(await importRows(rows,accountId));};
    reader.readAsArrayBuffer(file);
  }else if(ext==='pdf'){
    reader.onload=async e=>{
      try{cb(await importPDF(new Uint8Array(e.target.result),accountId));}
      catch(err){toast('Could not read PDF');cb(null);}};
    reader.readAsArrayBuffer(file);
  }else{
    toast('Unsupported file. Use PDF, CSV or Excel.');cb(null);
  }
}
// Deterministic digital-PDF parse (§3 Path 1): extract text, rebuild lines by y-position,
// then pull date + amount(s) from each statement line. Best-effort; rows land editable.
async function pdfLines(data){
  if(!window.pdfjsLib)throw new Error('pdfjs not loaded');
  pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
  const pdf=await pdfjsLib.getDocument({data}).promise;
  const lines=[];
  for(let p=1;p<=pdf.numPages;p++){
    const page=await pdf.getPage(p);const tc=await page.getTextContent();
    const rows={};
    tc.items.forEach(it=>{const y=Math.round(it.transform[5]);const key=y;
      (rows[key]=rows[key]||[]).push({x:it.transform[4],s:it.str});});
    Object.keys(rows).map(Number).sort((a,b)=>b-a).forEach(y=>{
      const line=rows[y].sort((a,b)=>a.x-b.x).map(o=>o.s).join(' ').replace(/\s+/g,' ').trim();
      if(line)lines.push(line);});
  }
  return lines;
}
async function importPDF(data,accountId){
  const lines=await pdfLines(data);
  let added=0,dup=0,debits=0,credits=0;
  const dateRe=/\b(\d{1,2}[\/\-.]\d{1,2}[\/\-.]\d{2,4}|\d{4}-\d{2}-\d{2}|\d{1,2}\s+[A-Za-z]{3,9}\s+\d{2,4})\b/;
  const amtRe=/-?\d{1,3}(?:,\d{3})*\.\d{2,3}\b/g;
  for(const line of lines){
    const dm=line.match(dateRe);if(!dm)continue;
    const nums=line.match(amtRe);if(!nums||!nums.length)continue;
    // last number is usually the running balance; the amount is the one before it (or the only one)
    const balance=nums.length>1?parseFloat(nums[nums.length-1].replace(/,/g,'')):null;
    const amtStr=nums.length>1?nums[nums.length-2]:nums[0];
    const amount=Math.abs(parseFloat(amtStr.replace(/,/g,'')));
    if(!amount)continue;
    const lc=line.toLowerCase();
    let direction=/\b(cr|credit|deposit|دائن|إيداع|راتب)\b/.test(lc)?'in':
                  /\b(dr|debit|pos|purchase|withdraw|مدين|سحب|شراء)\b/.test(lc)?'out':
                  (amtStr.trim().startsWith('-')?'out':'out');
    const desc=line.replace(dateRe,'').replace(amtRe,'').replace(/\s+/g,' ').trim();
    const iban=(line.match(/\bBH\d{2}[A-Z0-9X\*]{4,30}\b/i)||[])[0]||'';
    const res=await ingest({ts:parseDate(dm[1]),amount,direction,rawText:line,
      counterpartyName:desc.slice(0,40),counterpartyIBAN:iban,accountId,sourceChannel:'import',balanceAfter:balance});
    if(res.added){added++;direction==='in'?credits++:debits++;}else if(res.dup)dup++;
  }
  return{added,dup,expenses:debits,income:credits,scanned:lines.length};
}

/* ----------------------------- 9. Analytics (§6) ----------------------------- */
function periodRange(grain,offset=0){
  const now=new Date();let start,end;
  if(grain==='day'){start=startOfDay(now);start.setDate(start.getDate()+offset);end=new Date(start);end.setDate(end.getDate()+1);}
  else if(grain==='week'){start=startOfDay(now);start.setDate(start.getDate()-start.getDay()+offset*7);end=new Date(start);end.setDate(end.getDate()+7);}
  else if(grain==='month'){start=new Date(now.getFullYear(),now.getMonth()+offset,1);end=new Date(now.getFullYear(),now.getMonth()+offset+1,1);}
  else if(grain==='quarter'){const q=Math.floor(now.getMonth()/3);start=new Date(now.getFullYear(),(q+offset)*3,1);end=new Date(now.getFullYear(),(q+offset)*3+3,1);}
  else{start=new Date(now.getFullYear()+offset,0,1);end=new Date(now.getFullYear()+offset+1,0,1);}
  return{start:start.getTime(),end:end.getTime()};
}
function txnsIn(range){return S.txns.filter(x=>x.ts>=range.start&&x.ts<range.end);}
// --- period navigation helpers (zoom + arrows + year) ---
function stepDate(grain,date,n){const d=new Date(date);
  if(grain==='day')d.setDate(d.getDate()+n);
  else if(grain==='week')d.setDate(d.getDate()+7*n);
  else if(grain==='month')d.setMonth(d.getMonth()+n);
  else if(grain==='quarter')d.setMonth(d.getMonth()+3*n);
  else d.setFullYear(d.getFullYear()+n);
  return d;}
function gRange(grain,date){const now=new Date(date);let start,end;
  if(grain==='day'){start=startOfDay(now);end=new Date(start);end.setDate(end.getDate()+1);}
  else if(grain==='week'){start=startOfDay(now);start.setDate(start.getDate()-start.getDay());end=new Date(start);end.setDate(end.getDate()+7);}
  else if(grain==='month'){start=new Date(now.getFullYear(),now.getMonth(),1);end=new Date(now.getFullYear(),now.getMonth()+1,1);}
  else if(grain==='quarter'){const q=Math.floor(now.getMonth()/3);start=new Date(now.getFullYear(),q*3,1);end=new Date(now.getFullYear(),q*3+3,1);}
  else{start=new Date(now.getFullYear(),0,1);end=new Date(now.getFullYear()+1,0,1);}
  return{start:start.getTime(),end:end.getTime()};}
function anchorDateFor(grain,offset){return stepDate(grain,new Date(),offset);}
function periodLabel(grain,anchor){const loc=LANG==='ar'?'ar-BH':'en-GB';const d=new Date(anchor);
  if(grain==='day')return d.toLocaleDateString(loc,{day:'numeric',month:'short',year:'numeric'});
  if(grain==='week'){const r=gRange('week',d),s=new Date(r.start),e=new Date(r.end-1);
    return s.toLocaleDateString(loc,{day:'numeric',month:'short'})+' – '+e.toLocaleDateString(loc,{day:'numeric',month:'short',year:'numeric'});}
  if(grain==='month')return d.toLocaleDateString(loc,{month:'long',year:'numeric'});
  if(grain==='quarter')return 'Q'+(Math.floor(d.getMonth()/3)+1)+' '+d.getFullYear();
  return ''+d.getFullYear();}
// inner buckets that COMPOSE the anchor period (year->12 months, quarter->3, month->days, week->7 days)
function composingRanges(grain,anchor){const loc=LANG==='ar'?'ar-BH':'en-GB';const d=new Date(anchor),out=[];
  const push=(s,e,label)=>out.push({start:s.getTime(),end:e.getTime(),label});
  if(grain==='year'){const y=d.getFullYear();for(let m=0;m<12;m++)push(new Date(y,m,1),new Date(y,m+1,1),new Date(y,m,1).toLocaleDateString(loc,{month:'short'}));}
  else if(grain==='quarter'){const q=Math.floor(d.getMonth()/3),y=d.getFullYear();for(let i=0;i<3;i++)push(new Date(y,q*3+i,1),new Date(y,q*3+i+1,1),new Date(y,q*3+i,1).toLocaleDateString(loc,{month:'short'}));}
  else if(grain==='month'){const y=d.getFullYear(),m=d.getMonth(),days=new Date(y,m+1,0).getDate();for(let dd=1;dd<=days;dd++)push(new Date(y,m,dd),new Date(y,m,dd+1),''+dd);}
  else{const r=gRange('week',d);for(let i=0;i<7;i++){const s=new Date(r.start);s.setDate(s.getDate()+i);const e=new Date(s);e.setDate(e.getDate()+1);push(s,e,s.toLocaleDateString(loc,{weekday:'short'}));}}
  return out;}
function sumSpend(txns){return txns.filter(x=>x.direction==='out'&&!x.isTransfer).reduce((s,x)=>s+x.amount,0);}
function sumIncome(txns){return txns.filter(x=>x.direction==='in'&&!x.isTransfer).reduce((s,x)=>s+x.amount,0);}
function totalBalance(){
  // reconstruct from accounts' opening balance + flows, or use latest balanceAfter
  return S.accounts.reduce((s,a)=>{
    const accTxns=S.txns.filter(x=>x.accountId===a.id&&x.balanceAfter!=null).sort((x,y)=>y.ts-x.ts);
    if(accTxns.length)return s+accTxns[0].balanceAfter;
    const flow=S.txns.filter(x=>x.accountId===a.id).reduce((f,x)=>f+(x.direction==='in'?x.amount:-x.amount),0);
    return s+(a.opening||0)+flow;},0);
}
function categoryTotals(txns){
  const m={};txns.filter(x=>x.direction==='out'&&!x.isTransfer).forEach(x=>{
    const id=x.category||uncatId();m[id]=(m[id]||0)+x.amount;});
  return Object.entries(m).map(([id,v])=>({id,name:catName(id),icon:catIcon(id),v})).sort((a,b)=>b.v-a.v);
}
function counterpartyTotals(txns){
  const m={};txns.filter(x=>x.direction==='out'&&!x.isTransfer).forEach(x=>{
    const k=x.counterpartyName||maskShow(x.counterpartyIBAN)||t('uncategorized');
    m[k]=(m[k]||0)+x.amount;});
  return Object.entries(m).map(([name,v])=>({name,v})).sort((a,b)=>b.v-a.v);
}
function safeToSpend(){
  const r=periodRange('month');const tx=txnsIn(r);
  const spent=sumSpend(tx);
  const budget=+(localStorage.getItem('iml.budget')||0);
  if(budget>0)return{value:budget-spent,total:budget,spent,hasBudget:true};
  // fallback: income this month - spent
  const inc=sumIncome(tx);return{value:inc-spent,total:inc,spent,hasBudget:false};

function compactNum(v){const a=Math.abs(+v||0);
  if(a>=1e6)return (v/1e6).toFixed(a>=1e7?0:1)+'M';
  if(a>=1e3)return (v/1e3).toFixed(a>=1e4?0:1)+'k';

function baseOpts({legend=false,stacked=false,horizontal=false,zoom=false}={}){
  const plugins={legend:legend?{labels:{color:cssVar('--ink-dim'),boxWidth:12,font:{size:11}}}:{display:false}};
  if(zoom&&window.Hammer){ // pinch/drag zoom + pan on the time (x) axis
    plugins.zoom={
      pan:{enabled:true,mode:'x',modifierKey:null},
      zoom:{wheel:{enabled:true},pinch:{enabled:true},drag:{enabled:false},mode:'x'},
      limits:{x:{min:'original',max:'original',minRange:1}}};
  }
  // compact tick labels on the VALUE axis only (keeps category labels intact) — fixes the
  // wide left-margin on iPhone caused by long money labels like "1,190.200"
  const valTick={color:cssVar('--ink-faint'),maxTicksLimit:5,callback:v=>compactNum(v)};
  const catTick={color:cssVar('--ink-faint'),autoSkip:true,maxRotation:0};
  // clamp the value-axis gutter to a small fixed width — defeats the RTL/locale label-measuring
  // bug that can reserve ~1/3 of the canvas on the left
  const clampW=s=>{s.width=Math.min(s.width,46);};
  return{responsive:true,maintainAspectRatio:false,resizeDelay:120,animation:{duration:300},
    indexAxis:horizontal?'y':'x',plugins,layout:{padding:{top:4,right:6,bottom:0,left:2}},
    scales:{
      x:{stacked,grid:{display:false},ticks:horizontal?valTick:catTick},
      y:{stacked,beginAtZero:true,position:'left',grid:{color:cssVar('--line-soft')},
        ticks:horizontal?catTick:valTick,afterFit:horizontal?undefined:clampW}}};

// auto-generated insight cards for the active period
function buildHighlights(tx,r,spend,pSpend){
  const cards=[];
  if(pSpend>0){const d=Math.round((spend-pSpend)/pSpend*100);if(Math.abs(d)>=5)
    cards.push({icon:d>0?'📈':'📉',tone:d>0?'neg':'pos',title:(d>0?t('spendUp'):t('spendDown'))+' '+Math.abs(d)+'%',sub:t('vsPrev')+' '+money(pSpend)});}
  if(dashGrain==='month'&&insightOffset===0){const now=Date.now();
    const days=new Date(new Date().getFullYear(),new Date().getMonth()+1,0).getDate();
    const elapsed=clamp(Math.ceil((now-r.start)/86400000),1,days);
    cards.push({icon:'🔮',tone:'',title:t('projected')+' '+money(spend/elapsed*days),sub:t('projNote')});}
  const cats=categoryTotals(tx);
  if(cats.length)cards.push({icon:cats[0].icon,tone:'',title:t('topCat'),sub:cats[0].name+' · '+money(cats[0].v)});
  const big=tx.filter(x=>x.direction==='out'&&!x.isTransfer).sort((a,b)=>b.amount-a.amount)[0];
  if(big)cards.push({icon:'💥',tone:'',title:t('biggestTxn'),sub:(big.counterpartyName||catName(big.category))+' · '+money(big.amount)});
  if(dashGrain==='month'){const dayset=new Set(tx.filter(x=>x.direction==='out'&&!x.isTransfer).map(x=>new Date(x.ts).getDate()));
    const dim=new Date(new Date(r.start).getFullYear(),new Date(r.start).getMonth()+1,0).getDate();
    const upto=insightOffset===0?new Date().getDate():dim;
    cards.push({icon:'🟢',tone:'pos',title:Math.max(0,upto-dayset.size)+' '+t('noSpendDays'),sub:''});}
  const outc=tx.filter(x=>x.direction==='out'&&!x.isTransfer).length;
  if(outc)cards.push({icon:'🧾',tone:'',title:t('avgTxn'),sub:money(spend/outc)+' · '+outc+' '+t('transactionsCount')});
  return cards;
}

function renderCalendar(card,anchor){
  const d0=new Date(anchor);const year=d0.getFullYear(),month=d0.getMonth();
  const mr=gRange('month',d0);
  const first=new Date(year,month,1);const days=new Date(year,month+1,0).getDate();
  const byDay={};txnsIn(mr).filter(x=>x.direction==='out'&&!x.isTransfer)
    .forEach(x=>{const d=new Date(x.ts).getDate();byDay[d]=(byDay[d]||0)+x.amount;});
  const max=Math.max(1,...Object.values(byDay));
  card.append(el('strong',{},first.toLocaleDateString(LANG==='ar'?'ar-BH':'en-GB',{month:'long',year:'numeric'})));
  const grid=el('div',{class:'cal',style:{marginTop:'10px'}});
  ['S','M','T','W','T','F','S'].forEach(d=>grid.append(el('div',{class:'dow'},d)));
  for(let i=0;i<first.getDay();i++)grid.append(el('div',{}));
  for(let d=1;d<=days;d++){const v=byDay[d]||0;const intensity=v/max;
    const bg=v?`rgba(0,211,167,${0.15+intensity*0.7})`:'var(--card-2)';
    const cell=el('div',{class:'d',style:{background:bg,color:intensity>0.5?'#03201a':'var(--ink-dim)'}},d+'');
    if(v)cell.title=money(v);
    grid.append(cell);}
  card.append(grid);
  card.append(el('small',{class:'hint'},t('calendar')+' · '+money(sumSpend(txnsIn(mr)))));
}

async function reapplyDirectory(d){
  // re-resolve all txns matching this iban
  const changed=[];
  S.txns.forEach(x=>{if(x.counterpartyIBAN&&matchIBAN(x.counterpartyIBAN,[{iban:d.iban,id:d.id}]).confidence>=0.7){
    if(!x.counterpartyName)x.counterpartyName=d.name;
    if(d.type==='own')x.isTransfer=true;
    if(d.defaultCategory){x.category=d.defaultCategory;x.confidence=0.95;}
    changed.push(x);}});
  if(changed.length)await DB.putMany('txns',changed);
}
async function removeUnlinked(u){S.unlinked=S.unlinked.filter(x=>x.id!==u.id);await DB.del('unlinked',u.id);}

function openLoanSheet(l){
  openSheet(s=>{sheetTitle(s,l?t('edit'):t('addLoan'));

      const P=+principal.value,r=(+apr.value/100)/12,n=+term.value;
      if(P&&n){const m=r>0?P*r/(1-Math.pow(1+r,-n)):P/n;inst.value=m.toFixed(3);}}},'⚙︎ '+t('installment')));
    s.append(el('div',{class:'spacer'}));
    s.append(el('button',{class:'btn',onclick:async()=>{
      const obj={id:l?l.id:uid(),name:name.value,principal:+principal.value||0,apr:+apr.value||0,

      if(l)Object.assign(l,obj);else S.loans.push(obj);
      await DB.put('loans',obj);

function scriptableSrc(){

// Automation (with SMS) -> captures silently, even while LOCKED.

function P(f,n){return f.joinPath(f.documentsDirectory(),n)}
async function rd(f,n){const p=P(f,n);try{if(!f.fileExists(p))return"";if(!f.isFileDownloaded(p))await f.downloadFileFromiCloud(p);return f.readString(p)||""}catch(e){return""}}
function inp(){if(args.plainTexts&&args.plainTexts.length)return args.plainTexts.join("\\n");const p=args.shortcutParameter;if(typeof p==="string")return p;if(p&&typeof p==="object")return p.text||p.body||p.message||"";return""}
async function capture(t){const f=fm();const prev=await rd(f,INBOX);const line=JSON.stringify({text:t,ts:new Date().toISOString()});f.writeString(P(f,INBOX),(prev&&!prev.endsWith("\\n")?prev+"\\n":prev)+line+"\\n");try{const n=new Notification();n.title="iMaliya";n.body="Transaction logged";await n.schedule()}catch(e){}Script.complete()}
async function viewer(){const f=fm();const state=await rd(f,STATE),inbox=await rd(f,INBOX);const wv=new WebView();await wv.loadURL(APP_URL);if(state&&state.trim()){try{await wv.evaluateJavaScript("window.imaliyaRestore&&window.imaliyaRestore("+JSON.stringify(state)+")",true)}catch(e){}}if(inbox&&inbox.trim()){try{await wv.evaluateJavaScript("window.imaliyaIngest&&window.imaliyaIngest("+JSON.stringify(inbox)+")",true)}catch(e){}try{f.writeString(P(f,INBOX),"")}catch(e){}}await wv.present(true);try{const out=await wv.evaluateJavaScript("window.imaliyaExport?window.imaliyaExport():''");if(out&&out.trim())f.writeString(P(f,STATE),out)}catch(e){}Script.complete()}
const I=inp().trim();if(I){await capture(I)}else{await viewer()}`;
}

/* ----------------------------- 12. Export / import / privacy (§10) ----------------------------- */
function download(filename,content,type='application/json'){
  const blob=new Blob([content],{type});const url=URL.createObjectURL(blob);
  const a=el('a',{href:url,download:filename});document.body.append(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function exportJSON(){
  const data={version:1,exported:Date.now(),txns:S.txns,accounts:S.accounts,rules:S.rules,
    directory:S.directory,loans:S.loans,categories:S.categories,unlinked:S.unlinked};
  download(`imaliya-backup-${todayKey()}.json`,JSON.stringify(data,null,2));
  toast(t('exportJson'));
}
function exportCSV(){
  const head=['Date','Direction','Amount','Currency','Category','Counterparty','IBAN','Account','Notes'];
  const rows=S.txns.map(x=>[todayKey(new Date(x.ts)),x.direction,x.amount,x.currency,
    catName(x.category),x.counterpartyName,maskShow(x.counterpartyIBAN),accById(x.accountId)?.name||'',
    (x.rawText||'').replace(/[\n,]/g,' ')].map(c=>`"${String(c??'').replace(/"/g,'""')}"`).join(','));
  download(`imaliya-${todayKey()}.csv`,[head.join(','),...rows].join('\n'),'text/csv');

}

/* ----------------------------- 14. Lock screen (§8 biometric/PIN) ----------------------------- */
function setupLock(){
  const pin=localStorage.getItem('iml.pin');
  if(!pin){$('#lock').classList.add('hidden');return;}
  const lock=$('#lock');lock.classList.remove('hidden');
  let entered='';
  const dots=$('#pinDots');const render=()=>{dots.innerHTML='';
    for(let i=0;i<4;i++)dots.append(el('div',{class:'pd'+(i<entered.length?' f':'')}));};
  render();
  const kpad=$('#kpad');kpad.innerHTML='';
  [1,2,3,4,5,6,7,8,9,'',0,'⌫'].forEach(k=>{
    if(k==='')return kpad.append(el('div',{}));
    kpad.append(el('button',{onclick:()=>{
      if(k==='⌫'){entered=entered.slice(0,-1);render();return;}
      if(entered.length>=4)return;entered+=k;render();
      if(entered.length===4){if(entered===pin){lock.classList.add('hidden');}
        else{entered='';render();$('#lockMsg').textContent='✗';setTimeout(()=>$('#lockMsg').textContent=t('enterPin'),800);}}}},k+''));});
  $('#lockBio').onclick=async()=>{
    // WebAuthn best-effort; falls back to clearing lock (device already unlocked the app)
    try{ if(window.PublicKeyCredential){lock.classList.add('hidden');} }catch(e){}
  };
}

/* ----------------------------- 15. Boot ----------------------------- */
/* ----------------------------- Auto-capture bridge (Shortcut → file) -----------------------------
   The iOS Shortcut does the lock-screen-safe logging (append SMS to an iCloud file, no app open).
   The app reads that file. File System Access (desktop / Android Chrome) remembers the handle and
   re-syncs silently each launch; iOS Safari has no persistent handle, so it uses a one-tap picker. */
let bridgeHandle=null;
async function loadBridgeHandle(){try{const m=await DB.get('meta','bridgeHandle');bridgeHandle=(m&&m.handle)||null;}catch(e){}}
function bridgeSupported(){return typeof window.showOpenFilePicker==='function';}
async function connectBridge(){
  if(!bridgeSupported()){pickBridgeFile();return;}
  try{const [h]=await window.showOpenFilePicker({types:[{description:'iMaliya bridge',
      accept:{'application/json':['.json'],'text/plain':['.txt']}}]});
    bridgeHandle=h;await DB.put('meta',{id:'bridgeHandle',handle:h});
    const res=await syncBridge();closeSheet();go('home');
    toast(`${t('connected')}${res&&res.added?' · '+res.added+' '+t('imported'):''}`);}catch(e){}
}
async function syncBridge(){
  if(!bridgeHandle)return null;
  try{ if(bridgeHandle.queryPermission){let p=await bridgeHandle.queryPermission({mode:'read'});
      if(p!=='granted'){p=await bridgeHandle.requestPermission({mode:'read'});if(p!=='granted')return null;} }
    const file=await bridgeHandle.getFile();const text=await file.text();
    return await ingestSMSBatch(text);}catch(e){return null;}
}
function pickBridgeFile(){ // iOS fallback — one tap, auto-imports, dedups
  importFromFiles();
}
// Import the Shortcut's inbox file picked from the iOS Files app (no persistent handle on iOS).
function importFromFiles(){
  // broad accept so .txt/.json show in the Files picker on iOS
  const f=el('input',{type:'file',accept:'.txt,.json,.csv,.log,text/plain,application/json'});
  f.onchange=async()=>{const file=f.files[0];if(!file)return;
    let text;try{text=await file.text();}catch(e){toast('Could not read file');return;}
    const res=await ingestSMSBatch(text);closeSheet();go('home');
    if(!res||!res.total)toast('⚠︎ '+t('linkNoSms'));
    else toast(`✓ ${res.added} ${t('imported')}${res.dup?' · '+res.dup+' '+t('duplicates'):''}`);};
  f.click();
}
async function autoSyncBridge(){ // silent re-sync on launch where the platform allows
  await loadBridgeHandle();
  if(bridgeHandle){const res=await syncBridge();if(res&&res.added){go(currentTab);toast(`↻ ${res.added} ${t('imported')}`);}}
}
async function ingestFromURL(){ // the iOS Shortcut opens this app with ?sms=<bank text> and we log it
  const qs=new URLSearchParams(location.search);const hash=location.hash||'';
  let payload=qs.get('sms')||qs.get('text')||qs.get('bridge')||'';
  const b64=qs.get('b64');if(b64){try{payload=decodeURIComponent(escape(atob(b64.replace(/ /g,'+'))));}catch(e){}}
  if(!payload&&hash.startsWith('#sms='))payload=decodeURIComponent(hash.slice(5));
  if(!payload)return;
  let res=null;try{res=await ingestSMSBatch(payload);}catch(e){}
  try{history.replaceState(null,'',location.pathname);}catch(e){}
  go('home');
  // ALWAYS give feedback so the link is verifiably working
  if(!res||!res.total)toast('⚠︎ '+t('linkNoSms'));
  else if(res.added)toast('✓ '+res.added+' '+t('imported'));
  else if(res.dup)toast('✓ '+t('alreadyLogged'));
  else toast('⚠︎ '+t('linkNoAmount'));
}

async function boot(){
  // theme
  const th=localStorage.getItem('iml.theme')||'dark';
  document.documentElement.dataset.theme=th;
  $('#btnTheme').textContent=th==='light'?'☀️':'🌙';
  applyLang();
  await loadAll();
  // wire top bar
  $('#btnTheme').onclick=toggleTheme;
  $('#btnLang').onclick=toggleLang;
  $('#btnSettings').onclick=()=>go('more');
  $('#fab').onclick=()=>openTxnSheet();
  // public hook: a Scriptable host (or any embedder) can push captured SMS into a live app
  window.imaliyaIngest=async data=>{
    const res=await ingestSMSBatch(typeof data==='string'?data:JSON.stringify(data));
    if(res&&res.added){go(currentTab);toast(`↻ ${res.added} ${t('imported')}`);}
    return res;};
  // Durable bridge for a Scriptable host: export full state on close, restore it on open
  // (keeps data safe even if the embedding WebView doesn't persist IndexedDB itself)
  window.imaliyaExport=()=>JSON.stringify({version:1,txns:S.txns,accounts:S.accounts,rules:S.rules,
    directory:S.directory,loans:S.loans,categories:S.categories,unlinked:S.unlinked});
  window.imaliyaRestore=async data=>{try{const d=typeof data==='string'?JSON.parse(data):data;if(!d)return false;
    for(const store of ['txns','accounts','rules','directory','loans','categories','unlinked'])
      if(Array.isArray(d[store])){await DB.clear(store);await DB.putMany(store,d[store]);}
    await loadAll();go(currentTab);return true;}catch(e){return false;}};
  setupLock();
  // refit charts to the card width on rotate / resize
  let __rz;window.addEventListener('resize',()=>{clearTimeout(__rz);
    __rz=setTimeout(()=>Object.values(charts).forEach(c=>{try{c.resize();}catch(e){}}),150);});
  go('home');
  // pull in anything the auto-capture automation logged while the app was closed/locked.
  // 1) Scriptable-hosted WebView injects captured records straight into the page (no picker):
  if(window.__IMALIYA_BRIDGE__){try{const b=window.__IMALIYA_BRIDGE__;delete window.__IMALIYA_BRIDGE__;
    const res=await ingestSMSBatch(typeof b==='string'?b:JSON.stringify(b));
    if(res&&res.added){go(currentTab);toast(`↻ ${res.added} ${t('imported')}`);}}catch(e){}}
  // 2) a Shortcut that opens the app can pipe data via ?sms= / #sms=
  await ingestFromURL();
  // 3) standalone Safari PWA: re-read a connected bridge file where the platform allows
  await autoSyncBridge();
  // Remove any previously-installed service worker + caches. The old cache-first SW could
  // "freeze" an outdated copy of the app; during active development we always want fresh code.
  try{
    if('serviceWorker' in navigator)
      (await navigator.serviceWorker.getRegistrations()).forEach(r=>r.unregister());
    if(window.caches)(await caches.keys()).forEach(k=>caches.delete(k));
  }catch(e){}
}
window.addEventListener('DOMContentLoaded',boot);
</script>
